<main class="auth-page">
  <section class="auth-card" aria-labelledby="reset-password-title">
    <header class="auth-intro">
      <div class="brand">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        </svg>
        <div>
          <span>SMS Fortuna</span>
          <small>Comunicación masiva</small>
        </div>
      </div>

      <h1 id="reset-password-title">Nueva contraseña</h1>
      <p>
        Ingresa tu nueva contraseña para recuperar el acceso.
      </p>
    </header>

    <form class="auth-form" (ngSubmit)="submit()">
      <p *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </p>

      <p *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </p>

      <div class="fields">
        <label>
          <span>Nueva contraseña</span>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="new-password"
            placeholder="Mínimo 6 caracteres"
          />
        </label>

        <label>
          <span>Confirmar contraseña</span>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            autocomplete="new-password"
            placeholder="Repite la contraseña"
          />
        </label>
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}
      </button>
    </form>

    <footer class="auth-links">
      <a routerLink="/login">Volver a iniciar sesión</a>
    </footer>
  </section>
</main>

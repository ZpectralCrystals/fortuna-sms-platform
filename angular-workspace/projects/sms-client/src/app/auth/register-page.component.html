<main class="register-page">
  <section class="register-card" aria-labelledby="register-title">
    <header>
      <div class="brand-wrap">
        <div class="brand">
          <svg
            class="brand-icon"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <div>
            <span class="brand-name">SMS Fortuna</span>
            <span class="brand-subtitle">Comunicación masiva</span>
          </div>
        </div>
      </div>

      <h1 id="register-title">Crea tu cuenta</h1>
      <p class="login-copy">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
    </header>

    <div class="bonus-box">
      Obtén 10 SMS gratis al registrarte
    </div>

    <form class="register-form" (ngSubmit)="submit()">
      <p *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </p>

      <p *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </p>

      <div class="fields">
        <label>
          <span>Nombre completo</span>
          <input
            type="text"
            name="fullName"
            [(ngModel)]="fullName"
            required
            placeholder="Juan Pérez"
            autocomplete="name"
          />
        </label>

        <label>
          <span>Razón Social</span>
          <input
            type="text"
            name="companyName"
            [(ngModel)]="companyName"
            required
            placeholder="Mi Empresa S.A.C."
            autocomplete="organization"
          />
        </label>

        <label>
          <span>RUC</span>
          <input
            type="text"
            name="ruc"
            [(ngModel)]="ruc"
            required
            maxlength="11"
            placeholder="20123456789"
            inputmode="numeric"
            autocomplete="off"
          />
        </label>

        <label>
          <span>Teléfono celular</span>
          <input
            type="tel"
            name="phone"
            [(ngModel)]="phone"
            required
            maxlength="15"
            placeholder="999999999"
            inputmode="tel"
            autocomplete="tel"
          />
        </label>

        <label>
          <span>Correo electrónico</span>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="email"
            placeholder="tu@empresa.com"
          />
        </label>

        <label>
          <span>Contraseña</span>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="new-password"
            placeholder="••••••••"
          />
        </label>

        <label>
          <span>Confirmar contraseña</span>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            autocomplete="new-password"
            placeholder="••••••••"
          />
        </label>
      </div>

      <button
        class="submit-button"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>

      <p class="legal-copy">
        Al registrarte, aceptas nuestros
        <a routerLink="/terms">Términos de Servicio</a>
        y
        <a routerLink="/privacy">Política de Privacidad</a>
      </p>
    </form>
  </section>
</main>
